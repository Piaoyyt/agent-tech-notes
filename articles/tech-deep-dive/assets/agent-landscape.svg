<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Agent 技术全景图：六层架构</title>
<desc>Agent技术栈从底层基础设施到顶层多Agent协作的六层架构全景图</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;font-weight:500;fill:#2C2C2A}
.ts{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;font-weight:400;fill:#5F5E5A}
.th{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;font-weight:500;fill:#2C2C2A}
.num{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:18px;font-weight:500}
.badge-text{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;font-weight:500}
.content-text{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;font-weight:400;fill:#5F5E5A}
.sub-title{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;font-weight:500;fill:#444441}
</style>
</defs>

<rect x="40" y="16" width="600" height="28" rx="4" fill="#1D9E75" opacity="0.08"/>
